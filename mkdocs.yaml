site_name: LLD Practice
theme:
  name: material
  palette:
    scheme: slate
    primary: teal
  features:
    - content.code.copy

plugins:
  - search
  - drawio

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .

nav:
  - Home: index.md
  - OOPS CORE: classes.md
  - OOPS Excercise: classes-excercise.md
  - Class Relationships: classrelationships.md
  - Class Relationships Excercise: classrelationships-excercise.md
  - SOLID Principles: solid.md
  - SOLID Exercises: solid-excercise.md
  - UML Diagrams:
    - Class Diagram: uml-class-diagram.md
    - Sequence Diagram: uml-sequence-diagram.md
    - Activity Diagram: uml-activity-diagram.md
    - Use Case Diagram: uml-usecase-diagram.md
